<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-ENjdO4Dr2bkBIFxQpeoBkJQ2t27Ffw5q6BvEHa7r78mYlYx04P1d5P/7666hw5e6" crossorigin="anonymous">
    <!-- Project CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="/images/logo.png" alt="Logo" width="30" height="30" class="d-inline-block align-text-top">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <i class="bi bi-list"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbar">
                <diV class="navbar-nav ms-auto">

                </diV>
            </div>
        </div>
    </nav>
    <div class="container">
        <button class="btn btn-outline-primary" id="addTaskBtn">Add Task</button>
        <table class="table table-striped mt-3" id="taskTable">
            <thead class="text-center">
                    <th scope="col">#</th>
                    <th scope="col">Task/Description</th>
                    <th scope="col">Responsible</th>
                    <th scope="col">ETA</th>
                    <th scope="col">Actions</th>
            </thead>
            <tbody>
                <!-- Tasks will be dynamically added here -->
            </tbody>

        </table>
    </div>

    <!-- Task modal -->
    <div class="modal fade" id="taskModal" tabindex="-1" aria-labelledby="taskModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="taskModalLabel">Add Task</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="taskForm">
              <div class="mb-3">
                <label for="description" class="form-label">Task/Description</label>
                <input type="text" class="form-control" id="description" required>
              </div>
              <div class="mb-3">
                <label for="responsible" class="form-label">Responsible</label>
                <input type="text" class="form-control" id="responsible">
              </div>
              <div class="mb-3">
                <label for="eta" class="form-label">ETA</label>
                <input type="datetime-local" class="form-control" id="eta">
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="saveTaskBtn">Save</button>
          </div>
        </div>
      </div>
    </div>
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha384-/xUj+3OJ+Y4I6m1z4iOzXxw+DlQFJ5iGkUoL5fU8P5p0Mz2n9fPQz8jvBrqui+XG" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+9/TGmCkA3RSV5R8z2x5nwP1WhtV" crossorigin="anonymous"></script>
    <!-- Project JS -->
    <script src="script.js"></script>
</body>
</html>
