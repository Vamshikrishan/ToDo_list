<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1Stop Task Manager</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<header>
<img src="/images/logo.png" class="logo">
<h2>Task Manager</h2>
</header>

<button class="add-btn" onclick="openModal()">Add Task</button>

<table>
<thead>
<tr>
<th>#</th>
<th>Task/Description</th>
<th>Responsible</th>
<th>ETA</th>
<th>Action</th>
</tr>
</thead>

<tbody id="taskTable"></tbody>

</table>

</div>


<!-- Modal -->
<div class="modal" id="taskModal">

<div class="modal-content">

<div class="modal-header">
<h3>Add Task</h3>
<span class="close" onclick="closeModal()">×</span>
</div>

<label>Task / Description</label>
<textarea id="taskInput"></textarea>

<label>Responsible</label>
<input type="text" id="responsibleInput">

<label>ETA</label>
<input type="datetime-local" id="etaInput">

<div class="modal-buttons">
<button class="cancel" onclick="closeModal()">Cancel</button>
<button class="add" onclick="addTask()">Add Task</button>
</div>

</div>
</div>


<script src="script.js"></script>

</body>
</html>
